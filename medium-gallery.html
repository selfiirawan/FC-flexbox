<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        body {
            background-color: #f0f0f0;
        }

        h1, p {
            text-align: center;
            font-family: sans-serif;
        }

        p {
            margin: 0 0 30px;
        }

        h1 {
            margin: 10px 0;
        }

        .container {
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            background-color: white;
            justify-content: space-around;
            border-radius: 10px;
        }

        img {
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>My Photo Gallery</h1>
    <p>A responsive photo gallery created with Flexbox</p>

    <div class="container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
        <img src="https://placehold.co/150x150" alt="img-container">
    </div>
</body>
</html>
